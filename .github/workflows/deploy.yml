name: Deploy to OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建 VitePress
        run: npm run build

      - name: 安装 ossutil 并上传
        env:
          AK_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          AK_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        run: |
          set -e
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.15/ossutil64 -O ossutil
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/

          echo "ossutil 版本: $(ossutil --version)"

          ossutil cp -r docs/.vitepress/dist/ oss://docs-wehifun/ --update -f \
            -i "$AK_ID" \
            -k "$AK_SECRET" \
            -e oss-cn-beijing.aliyuncs.com

      - name: 刷新 CDN
        env:
          AK_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          AK_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        run: |
          set -e
          curl -sSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o aliyun.tgz
          tar xzf aliyun.tgz
          sudo mv aliyun /usr/local/bin/

          echo "aliyun CLI 版本: $(aliyun --version)"

          aliyun cdn RefreshObjectCaches \
            --access-key-id "$AK_ID" \
            --access-key-secret "$AK_SECRET" \
            --region cn-beijing \
            --ObjectPath https://docs.wehifun.cn/ \
            --ObjectType Directory
